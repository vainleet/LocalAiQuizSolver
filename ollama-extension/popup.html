<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollama Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      background: #0f0f13;
      color: #e2e2e8;
      font-family: 'Manrope', sans-serif;
      font-size: 13px;
      min-height: 200px;
    }

    .header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.02);
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 16px rgba(99, 102, 241, 0.4);
    }

    .logo svg { color: #fff; }

    .title-block h1 {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: #fff;
    }

    .title-block p {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 1px;
    }

    .body { padding: 18px 20px; }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 10px;
    }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 12px;
      color: #e2e2e8;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus { border-color: rgba(99, 102, 241, 0.5); }

    .save-btn {
      width: 100%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Manrope', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 10px;
      cursor: pointer;
      margin-top: 4px;
      transition: all 0.15s;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .save-btn:hover {
      box-shadow: 0 6px 18px rgba(99, 102, 241, 0.5);
      transform: translateY(-1px);
    }

    .status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
      display: none;
    }

    .status.success {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.2);
      color: #6ee7b7;
      display: block;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 16px 0;
    }

    .hint {
      background: rgba(99, 102, 241, 0.07);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .hint p {
      font-size: 11.5px;
      line-height: 1.6;
      color: rgba(255,255,255,0.5);
    }

    .hint strong { color: rgba(255,255,255,0.75); }

    kbd {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 12c0-2.2 1.8-4 4-4s4 1.8 4 4-1.8 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
      </svg>
    </div>
    <div class="title-block">
      <h1>Ollama Assistant</h1>
      <p>Локальный ИИ в браузере</p>
    </div>
  </div>

  <div class="body">
    <div class="section-title">Настройки</div>

    <div class="field">
      <label>Хост Ollama</label>
      <input type="text" id="host" placeholder="http://localhost:11434">
    </div>

    <div class="field">
      <label>Модель</label>
      <input type="text" id="model" placeholder="gemma3:4b">
    </div>

    <button class="save-btn" id="save">Сохранить</button>
    <div class="status" id="status">✓ Настройки сохранены</div>

    <div class="divider"></div>

    <div class="hint">
      <p>
        <strong>Как использовать:</strong><br>
        Выделите текст на странице → нажмите правую кнопку мыши → <strong>Спросить Ollama</strong>.<br><br>
        В появившейся панели можно задать вопрос или оставить пустым для автообъяснения. <kbd>Ctrl+Enter</kbd> для отправки.
      </p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
